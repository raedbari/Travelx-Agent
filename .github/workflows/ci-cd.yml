name: travelx-agent-ci-cd

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: travelx-agent-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest

    env:
      IMAGE: raedbari/travelx-agent
      TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.TAG }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_to_k8s:
    name: Deploy to Kubernetes
    needs: build_and_push
    runs-on: self-hosted

    env:
      IMAGE: raedbari/travelx-agent
      TAG: ${{ github.sha }}
      NAMESPACE: default
      DEPLOYMENT: travelx-agent
      CONTAINER: travelx-agent

    steps:
      - name: Sanity check
        shell: bash
        run: |
          set -euo pipefail

          echo "Checking kubectl client..."
          kubectl version --client

          echo "Checking target deployment..."
          kubectl -n "$NAMESPACE" get deploy "$DEPLOYMENT" -o name

      - name: Update image and wait for rollout
        shell: bash
        run: |
          set -euo pipefail

          echo "Updating deployment image..."
          kubectl -n "$NAMESPACE" set image deploy/"$DEPLOYMENT" \
            "$CONTAINER"="${IMAGE}:${TAG}"

          echo "Annotating deployment with CI metadata..."
          kubectl -n "$NAMESPACE" annotate deploy/"$DEPLOYMENT" \
            ci.commit="${GITHUB_SHA}" \
            ci.image="${IMAGE}:${TAG}" \
            --overwrite

          echo "Waiting for rollout..."
          kubectl -n "$NAMESPACE" rollout status deploy/"$DEPLOYMENT" --timeout=300s

          echo -n "Resulting image: "
          kubectl -n "$NAMESPACE" get deploy "$DEPLOYMENT" \
            -o jsonpath='{.spec.template.spec.containers[0].image}{"\n"}'